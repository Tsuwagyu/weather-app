<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form action="" method="get" class="weather-form">
        <div class="form-input">
            <label for="location-search">Search for weather: </label>
            <input type="search" id="location-search" name="location-search">
        </div>
        <div class="btn">
            <button type="submit">Send</button>
        </div>
    </form>

    <div class="weather-results"></div>

    
</body>
</html>
