<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <form action="" method="get" class="weather-form">
        <div class="form-input">
            <label for="location-search">Search for weather*: </label>
            <input type="search" id="location-search" name="location-search" placeholder="location">
        </div>
        <div class="btn">
            <button type="submit">Send</button>
            <button type="button" id="toggleWeather">Toggle weather unit</button>
        </div>
    </form>

    <div class="weather-results"></div>

    
</body>
</html>
